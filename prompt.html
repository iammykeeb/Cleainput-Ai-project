<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleainput Ai</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      height: 100vh;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* ── SIDEBAR ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
    }
    .sidebar-overlay.open { display: block; }

    .sidebar-backdrop {
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .sidebar {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 78%;
      max-width: 320px;
      background: #f7f7f8;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      box-shadow: 4px 0 24px rgba(0,0,0,0.10);
    }
    .sidebar-overlay.open .sidebar { transform: translateX(0); }

    .sidebar-header {
      padding: 18px 16px 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-logo {
      font-size: 18px;
      font-weight: 700;
      color: #111;
      letter-spacing: -0.3px;
    }

    .sidebar-new-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 500;
      color: #222;
      cursor: pointer;
      box-shadow: 0 1px 6px rgba(0,0,0,0.10);
      margin: 10px 16px 14px 16px;
      width: calc(100% - 32px);
      justify-content: center;
    }
    .sidebar-new-btn:active { background: #f0f0f0; }

    .sidebar-section-label {
      font-size: 12px;
      color: #aaa;
      font-weight: 500;
      padding: 6px 16px 4px 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 10px;
      border-radius: 10px;
      cursor: pointer;
      position: relative;
    }
    .sidebar-item:active { background: #ebebeb; }
    .sidebar-item.active { background: #e8f0fe; }

    .sidebar-item-text {
      font-size: 14.5px;
      color: #111;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sidebar-item.active .sidebar-item-text { color: #4a8cff; }

    .sidebar-item-menu {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #aaa;
      display: flex;
      align-items: center;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .sidebar-item-menu:active { background: #ddd; }

    /* Dropdown menu */
    .item-dropdown {
      display: none;
      position: fixed;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      z-index: 200;
      min-width: 160px;
      padding: 6px 0;
      overflow: hidden;
    }
    .item-dropdown.open { display: block; }

    .item-dropdown button {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      background: none;
      border: none;
      padding: 13px 18px;
      font-size: 15px;
      color: #111;
      cursor: pointer;
      text-align: left;
    }
    .item-dropdown button:active { background: #f5f5f5; }
    .item-dropdown button.danger { color: #e53935; }

    .sidebar-footer {
      padding: 14px 16px;
      border-top: 1px solid #ebebeb;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4a8cff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .sidebar-username {
      font-size: 14px;
      font-weight: 500;
      color: #111;
    }

    /* Rename modal */
    .rename-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .rename-modal-overlay.open { display: flex; }
    .rename-modal {
      background: #fff;
      border-radius: 16px;
      padding: 22px 20px 16px 20px;
      width: 86%;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .rename-modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
    .rename-modal input {
      width: 100%;
      border: 1.5px solid #4a8cff;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
      outline: none;
      color: #111;
      font-family: inherit;
      margin-bottom: 14px;
    }
    .rename-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .rename-modal-actions button {
      border: none; border-radius: 20px; padding: 8px 20px;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .rename-cancel { background: #f0f0f0; color: #333; }
    .rename-save { background: #4a8cff; color: #fff; }

    /* ── CHAT BAR ── */
    .chat-bar-wrapper {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      width: 100%;
      padding: 12px 16px 20px 16px;
      background: #ffffff;
      z-index: 5;
    }

    /* AI response */
    .ai-response { width: 100%; margin-top: 20px; }

    .ai-label {
      font-size: 13px; color: #aaa; margin-bottom: 6px;
      display: flex; align-items: center; gap: 6px; transition: opacity 0.4s;
    }
    .ai-label .state-icon { font-size: 15px; display: inline-block; }
    .ai-label .dot-wave { display: inline-flex; gap: 3px; align-items: center; }
    .ai-label .dot-wave span {
      width: 4px; height: 4px; border-radius: 50%;
      background: #aaa; display: inline-block; animation: none; opacity: 0.3;
    }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-4px); opacity: 1; }
    }
    .ai-label.active .dot-wave span:nth-child(1) { animation: dotBounce 1s ease-in-out infinite 0s; }
    .ai-label.active .dot-wave span:nth-child(2) { animation: dotBounce 1s ease-in-out infinite 0.2s; }
    .ai-label.active .dot-wave span:nth-child(3) { animation: dotBounce 1s ease-in-out infinite 0.4s; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .ai-text.visible { animation: fadeSlideIn 0.5s ease forwards; }
    .ai-actions.visible { animation: fadeSlideIn 0.4s ease 0.2s forwards; opacity: 0; }

    .ai-text { font-size: 15px; color: #222; line-height: 1.6; }

    .ai-actions { display: none; align-items: center; gap: 14px; margin-top: 10px; }
    .ai-actions button {
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center; justify-content: center; transition: opacity 0.15s;
    }
    .ai-actions button:hover { opacity: 0.6; }

    /* Message area */
    .message-area {
      flex: 1;
      padding: 70px 16px 160px 16px;
      display: flex; flex-direction: column; align-items: flex-end;
      overflow-y: auto;
    }

    .message-bubble {
      background: #ffffff; color: #111; border-radius: 18px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.10); padding: 10px 16px;
      font-size: 15px; white-space: nowrap; display: inline-block; line-height: 1.5;
    }

    .message-actions {
      display: flex; align-items: center; gap: 10px; margin-top: 6px; padding-right: 4px;
    }
    .message-actions button {
      background: none; border: none; cursor: pointer; padding: 4px; color: #999;
      display: flex; align-items: center; justify-content: center; transition: color 0.15s;
    }
    .message-actions button:hover { color: #555; }

    /* Version counter */
    .version-counter {
      display: flex;
      align-items: center;
      gap: 2px;
      color: #bbb;
      font-size: 13px;
      user-select: none;
    }
    .version-counter .v-nav {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      color: #bbb;
      font-size: 15px;
      line-height: 1;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }
    .version-counter .v-nav:hover { color: #888; }
    .version-counter .v-nav:disabled { opacity: 0.3; cursor: default; }
    .version-counter .v-label {
      font-size: 13px;
      color: #bbb;
      min-width: 28px;
      text-align: center;
    }

    /* Header */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: #ffffff; display: flex; align-items: center; padding: 0 16px; z-index: 10;
    }
    .btn-hamburger {
      width: 40px; height: 40px; border-radius: 50%; background: transparent; border: none;
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.15s;
    }
    .btn-hamburger:hover { background: #e5e5e5; }

    /* Input pill */
    .input-pill {
      background: #ffffff; border-radius: 28px; padding: 14px 18px; margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.10);
    }
    .input-pill [contenteditable] {
      flex: 1; border: none; background: transparent; font-size: 15.5px; color: #111;
      outline: none; caret-color: #4a8cff; word-break: break-word; white-space: pre-wrap;
      max-height: 140px; overflow-y: auto; line-height: 1.5;
    }
    .input-pill [contenteditable]:empty::before {
      content: attr(data-placeholder); color: #a0a0a0; pointer-events: none; display: block;
    }

    /* Toolbar */
    .toolbar { display: flex; align-items: center; gap: 8px; }
    .chip {
      display: flex; align-items: center; gap: 6px; background: #ffffff;
      border: 1.5px solid #4a8cff; border-radius: 20px; padding: 7px 14px;
      font-size: 13.5px; font-weight: 500; color: #4a8cff; cursor: pointer;
      transition: background 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .chip:hover { background: #f0f5ff; }
    .chip:active { background: #e0ecff; }
    .chip svg { flex-shrink: 0; }
    .spacer { flex: 1; }

    .btn-plus {
      width: 36px; height: 36px; border-radius: 50%; background: transparent; border: none;
      display: flex; align-items: center; justify-content: center; cursor: pointer; color: #555; transition: background 0.15s;
    }
    .btn-plus:hover { background: #e5e5e5; }

    .btn-send {
      width: 48px; height: 38px; border-radius: 19px; background: #4a8cff; border: none;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 2px 8px rgba(74,140,255,0.35); transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-send:hover { background: #3a7af0; box-shadow: 0 3px 12px rgba(74,140,255,0.45); }
    .btn-send:active { background: #2b6bdf; }

    /* Bubble edit */
    .bubble-edit-container { display: none; width: 100%; }
    .bubble-edit-box {
      width: 100%; border: 2px solid #4a8cff; border-radius: 16px; padding: 12px 16px;
      font-size: 15px; color: #111; outline: none; font-family: inherit;
      line-height: 1.5; resize: none; background: #fff; box-shadow: 0 1px 6px rgba(0,0,0,0.10);
    }
    .bubble-edit-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
    .btn-cancel {
      background: #f0f0f0; border: none; border-radius: 20px; padding: 7px 18px;
      font-size: 14px; cursor: pointer; color: #333;
    }
    .btn-cancel:hover { background: #e5e5e5; }
    .btn-save {
      background: #4a8cff; border: none; border-radius: 20px; padding: 7px 18px;
      font-size: 14px; cursor: pointer; color: #fff; font-weight: 500;
    }
    .btn-save:hover { background: #3a7af0; }

    /* Markdown */
    .ai-text h1,.ai-text h2,.ai-text h3 { font-weight:700; margin-top:16px; margin-bottom:6px; color:#111; line-height:1.4; }
    .ai-text h1{font-size:18px;}.ai-text h2{font-size:16px;}.ai-text h3{font-size:15px;}
    .ai-text p { margin-bottom:10px; font-size:15px; color:#222; line-height:1.6; }
    .ai-text ul,.ai-text ol { margin:8px 0 12px 20px; }
    .ai-text ul{list-style:disc;}.ai-text ol{list-style:decimal;}
    .ai-text li { font-size:15px; color:#222; line-height:1.6; margin-bottom:6px; }
    .ai-text strong{font-weight:700;color:#111;}.ai-text em{font-style:italic;}
    .ai-text a{color:#4a8cff;text-decoration:none;}.ai-text a:hover{text-decoration:underline;}
    .ai-text hr{border:none;border-top:1px solid #eee;margin:14px 0;}
    .ai-text code{background:#f4f4f4;border-radius:4px;padding:2px 5px;font-size:13px;font-family:monospace;}
    .ai-text pre{background:#f4f4f4;border-radius:8px;padding:12px;overflow-x:auto;margin:10px 0;}
    .ai-text pre code{background:none;padding:0;}
    .ai-text table{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px;}
    .ai-text th,.ai-text td{text-align:left;padding:8px 10px;border-bottom:1px solid #eee;color:#222;line-height:1.5;}
    .ai-text th{font-weight:600;color:#555;font-size:13px;border-bottom:1px solid #ddd;}
    .ai-text td code{background:#f0f0f0;border-radius:4px;padding:2px 6px;font-size:12px;font-family:monospace;}
    .ai-text tr:last-child td{border-bottom:none;}

    .btn-retry-disabled { opacity:0.35; cursor:not-allowed !important; pointer-events:none; }

    /* Image preview */
    .image-preview-strip { display:none; flex-wrap:wrap; gap:8px; padding-bottom:10px; }
    .image-preview-strip.has-images { display:flex; }
    .img-thumb { position:relative; width:64px; height:64px; border-radius:10px; overflow:hidden; flex-shrink:0; }
    .img-thumb img { width:100%; height:100%; object-fit:cover; display:block; cursor:pointer; }
    .img-thumb .remove-img {
      position:absolute; top:2px; right:2px; width:18px; height:18px;
      border-radius:50%; background:rgba(0,0,0,0.55); border:none;
      display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;
    }
    .img-thumb .remove-img svg { display:block; }

    /* Lightbox */
    .img-lightbox {
      display:none; position:fixed; inset:0; background:#000; z-index:1000;
      align-items:center; justify-content:center; flex-direction:column;
    }
    .img-lightbox.open { display:flex; }
    .img-lightbox img { width:100%; height:100%; object-fit:contain; display:block; }
    .img-lightbox-close {
      position:absolute; top:16px; right:16px; width:36px; height:36px;
      border-radius:50%; background:rgba(255,255,255,0.15); border:none;
      display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:1001;
    }

    /* Scroll buttons */
    .scroll-btns {
      position:fixed; right:14px; bottom:110px;
      display:flex; flex-direction:column; gap:6px; z-index:20;
    }
    .scroll-btn {
      width:36px; height:36px; border-radius:50%; background:#fff; border:none;
      box-shadow:0 2px 8px rgba(0,0,0,0.15); display:flex; align-items:center;
      justify-content:center; cursor:pointer; opacity:0; pointer-events:none;
      transition:opacity 0.2s, transform 0.2s;
    }
    .scroll-btn.visible { opacity:1; pointer-events:auto; }
    .scroll-btn:active { transform:scale(0.92); }
  </style>
</head>
<body>

  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay">
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-logo">Cleainput Ai</span>
      </div>
      <button class="sidebar-new-btn" id="sidebar-new-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#222" stroke-width="1.8"/><line x1="12" y1="8" x2="12" y2="16" stroke="#222" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="12" x2="16" y2="12" stroke="#222" stroke-width="2" stroke-linecap="round"/></svg>
        New chat
      </button>
      <div class="sidebar-section-label">Recent</div>
      <div class="sidebar-list" id="sidebar-list"></div>
      <div class="sidebar-footer">
        <div class="sidebar-avatar">O</div>
        <span class="sidebar-username">OfficialMykeeE</span>
      </div>
    </div>
  </div>

  <!-- Dropdown menu (shared, positioned dynamically) -->
  <div class="item-dropdown" id="item-dropdown">
    <button id="dd-rename">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" stroke="#333" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" stroke="#333" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Rename
    </button>
    <button id="dd-delete" class="danger">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><polyline points="3 6 5 6 21 6" stroke="#e53935" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" stroke="#e53935" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 11v6M14 11v6" stroke="#e53935" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Delete
    </button>
  </div>

  <!-- Rename modal -->
  <div class="rename-modal-overlay" id="rename-modal-overlay">
    <div class="rename-modal">
      <h3>Rename chat</h3>
      <input type="text" id="rename-input" placeholder="Chat name">
      <div class="rename-modal-actions">
        <button class="rename-cancel" id="rename-cancel">Cancel</button>
        <button class="rename-save" id="rename-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <button class="btn-hamburger" id="hamburger-btn" aria-label="Menu">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <line x1="3" y1="6" x2="21" y2="6" stroke="#333" stroke-width="2" stroke-linecap="round"/>
        <line x1="3" y1="12" x2="21" y2="12" stroke="#333" stroke-width="2" stroke-linecap="round"/>
        <line x1="3" y1="18" x2="21" y2="18" stroke="#333" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <span style="position:absolute;left:50%;transform:translateX(-50%);font-size:16px;font-weight:600;color:#111;letter-spacing:-0.2px;">Cleainput Ai</span>
    <button id="new-chat-btn" style="margin-left:auto;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;width:40px;height:40px;" aria-label="New Chat">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M22 12C22 17.5228 17.5228 22 12 22C10.4003 22 8.88837 21.6244 7.54753 20.9565C7.19121 20.7791 6.78393 20.72 6.39939 20.8229L4.17335 21.4185C3.20701 21.677 2.32295 20.793 2.58151 19.8267L3.17712 17.6006C3.28001 17.2161 3.22094 16.8088 3.04346 16.4525C2.37562 15.1116 2 13.5997 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12ZM12 7.25C12.4142 7.25 12.75 7.58579 12.75 8V16C12.75 16.4142 12.4142 16.75 12 16.75C11.5858 16.75 11.25 16.4142 11.25 16V8C11.25 7.58579 11.5858 7.25 12 7.25ZM8.75 10C8.75 9.58579 8.41421 9.25 8 9.25C7.58579 9.25 7.25 9.58579 7.25 10V14C7.25 14.4142 7.58579 14.75 8 14.75C8.41421 14.75 8.75 14.4142 8.75 14V10ZM16 9.25C16.4142 9.25 16.75 9.58579 16.75 10V14C16.75 14.4142 16.4142 14.75 16 14.75C15.5858 14.75 15.25 14.4142 15.25 14V10C15.25 9.58579 15.5858 9.25 16 9.25Z" fill="#4a8cff"></path></svg>
    </button>
  </header>

  <!-- Scroll buttons -->
  <div class="scroll-btns">
    <button class="scroll-btn" id="scroll-top-btn" aria-label="Scroll to top">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 19V5M12 5L6 11M12 5L18 11" stroke="#555" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="scroll-btn" id="scroll-bottom-btn" aria-label="Scroll to bottom">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M12 19L6 13M12 19L18 13" stroke="#555" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <!-- Message area -->
  <div class="message-area" id="message-area">
    <div style="display:flex;flex-direction:column;align-items:flex-end;width:100%;">
      <div class="message-bubble" id="user-bubble">how are you,</div>
      <div class="message-actions">
        <button aria-label="Copy" id="bubble-copy-btn">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script>
    // ══════════════════════════════
    // VERSION COUNTER STATE
    // ══════════════════════════════
    // Hidden until first edit; starts at 1/1 on first save
    var messageVersions = ['how are you,'];
    var currentVersionIndex = 0; // 0-based

    function updateVersionCounter() {
      var counter = document.getElementById('version-counter');
      var total = messageVersions.length;
      var current = currentVersionIndex + 1;
      var label = document.getElementById('v-label');
      var prevBtn = document.getElementById('v-prev');
      var nextBtn = document.getElementById('v-next');

      // Only show counter once there are multiple versions
      if (total < 2) {
        counter.style.display = 'none';
        return;
      }
      counter.style.display = 'flex';
      label.textContent = current + ' / ' + total;
      prevBtn.disabled = currentVersionIndex === 0;
      nextBtn.disabled = currentVersionIndex === total - 1;
    }

    document.getElementById('v-prev').addEventListener('click', function() {
      if (currentVersionIndex > 0) {
        currentVersionIndex--;
        document.getElementById('user-bubble').textContent = messageVersions[currentVersionIndex];
        updateVersionCounter();
      }
    });

    document.getElementById('v-next').addEventListener('click', function() {
      if (currentVersionIndex < messageVersions.length - 1) {
        currentVersionIndex++;
        document.getElementById('user-bubble').textContent = messageVersions[currentVersionIndex];
        updateVersionCounter();
      }
    });

    // Counter hidden on init; appears after first edit

    // ══════════════════════════════
    // CHAT HISTORY (localStorage)
    // ══════════════════════════════
    function getChats() {
      try { return JSON.parse(localStorage.getItem('cleainput_chats') || '[]'); } catch(e){ return []; }
    }
    function saveChats(chats) {
      localStorage.setItem('cleainput_chats', JSON.stringify(chats));
    }
    function getCurrentId() {
      return localStorage.getItem('cleainput_current') || null;
    }
    function setCurrentId(id) {
      localStorage.setItem('cleainput_current', id);
    }

    if (getChats().length === 0) {
      var seed = [{ id: 'seed1', title: 'how are you,', ts: Date.now() }];
      saveChats(seed);
      setCurrentId('seed1');
    }

    // ══════════════════════════════
    // SIDEBAR
    // ══════════════════════════════
    var sidebarOverlay = document.getElementById('sidebar-overlay');
    var sidebarBackdrop = document.getElementById('sidebar-backdrop');
    var hamburgerBtn = document.getElementById('hamburger-btn');
    var sidebarList = document.getElementById('sidebar-list');
    var dropdown = document.getElementById('item-dropdown');
    var ddRename = document.getElementById('dd-rename');
    var ddDelete = document.getElementById('dd-delete');
    var renameModal = document.getElementById('rename-modal-overlay');
    var renameInput = document.getElementById('rename-input');
    var activeDropdownId = null;

    function openSidebar() { sidebarOverlay.classList.add('open'); renderSidebar(); }
    function closeSidebar() { sidebarOverlay.classList.remove('open'); closeDropdown(); }

    hamburgerBtn.addEventListener('click', openSidebar);
    sidebarBackdrop.addEventListener('click', closeSidebar);

    function renderSidebar() {
      var chats = getChats();
      var currentId = getCurrentId();
      sidebarList.innerHTML = '';
      chats.forEach(function(chat) {
        var item = document.createElement('div');
        item.className = 'sidebar-item' + (chat.id === currentId ? ' active' : '');
        item.innerHTML =
          '<span class="sidebar-item-text">' + escapeHtml(chat.title) + '</span>' +
          '<button class="sidebar-item-menu" data-id="' + chat.id + '" aria-label="More">'+
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.5" fill="#aaa"/><circle cx="12" cy="12" r="1.5" fill="#aaa"/><circle cx="19" cy="12" r="1.5" fill="#aaa"/></svg>'+
          '</button>';

        item.addEventListener('click', function(e) {
          if (e.target.closest('.sidebar-item-menu')) return;
          setCurrentId(chat.id);
          updateBubbleFromChat(chat);
          closeSidebar();
        });

        item.querySelector('.sidebar-item-menu').addEventListener('click', function(e) {
          e.stopPropagation();
          openDropdown(chat.id, this);
        });

        sidebarList.appendChild(item);
      });
    }

    function updateBubbleFromChat(chat) {
      var bubble = document.getElementById('user-bubble');
      bubble.textContent = chat.title;
    }

    function escapeHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function openDropdown(id, btn) {
      closeDropdown();
      activeDropdownId = id;
      var rect = btn.getBoundingClientRect();
      dropdown.style.top = (rect.bottom + 4) + 'px';
      dropdown.style.left = Math.min(rect.left, window.innerWidth - 180) + 'px';
      dropdown.classList.add('open');
    }
    function closeDropdown() {
      dropdown.classList.remove('open');
      activeDropdownId = null;
    }
    document.addEventListener('click', function(e) {
      if (!dropdown.contains(e.target)) closeDropdown();
    });

    ddRename.addEventListener('click', function() {
      if (!activeDropdownId) return;
      var chats = getChats();
      var chat = chats.find(function(c){ return c.id === activeDropdownId; });
      if (!chat) return;
      renameInput.value = chat.title;
      renameModal.classList.add('open');
      closeDropdown();
      closeSidebar();
      setTimeout(function(){ renameInput.focus(); renameInput.select(); }, 100);
    });

    ddDelete.addEventListener('click', function() {
      if (!activeDropdownId) return;
      var chats = getChats().filter(function(c){ return c.id !== activeDropdownId; });
      saveChats(chats);
      if (getCurrentId() === activeDropdownId) {
        setCurrentId(chats.length ? chats[0].id : null);
      }
      closeDropdown();
      renderSidebar();
    });

    document.getElementById('rename-cancel').addEventListener('click', function() {
      renameModal.classList.remove('open');
    });
    document.getElementById('rename-save').addEventListener('click', function() {
      var newName = renameInput.value.trim();
      if (!newName) return;
      var chats = getChats();
      chats.forEach(function(c) {
        if (c.id === (activeDropdownId || getCurrentId())) c.title = newName;
      });
      saveChats(chats);
      renameModal.classList.remove('open');
      var cur = chats.find(function(c){ return c.id === getCurrentId(); });
      if (cur) document.getElementById('user-bubble').textContent = cur.title;
    });

    document.getElementById('sidebar-new-btn').addEventListener('click', function() {
      startNewChat();
      closeSidebar();
    });

    function startNewChat() {
      var id = 'chat_' + Date.now();
      var chats = getChats();
      chats.unshift({ id: id, title: 'New chat', ts: Date.now() });
      saveChats(chats);
      setCurrentId(id);
      clearChatUI();
    }

    function clearChatUI() {
      var msgArea = document.getElementById('message-area');
      msgArea.innerHTML = '';
      var editor = document.getElementById('editor');
      editor.innerHTML = '';
      localStorage.removeItem('cleainput_draft');
      var strip = document.getElementById('image-preview-strip');
      strip.innerHTML = '';
      strip.classList.remove('has-images');
      updateScrollBtns();
    }

    function saveBubbleTitleToCurrentChat(title) {
      var chats = getChats();
      var id = getCurrentId();
      var found = false;
      chats.forEach(function(c) {
        if (c.id === id) { c.title = title; found = true; }
      });
      if (!found && id) chats.unshift({ id: id, title: title, ts: Date.now() });
      saveChats(chats);
    }

    document.getElementById('new-chat-btn').addEventListener('click', function() {
      startNewChat();
    });

    // ══════════════════════════════
    // MARKDOWN
    // ══════════════════════════════
    marked.setOptions({ gfm: true, breaks: true });

    function isResearchResponse(text) {
      var s = 0;
      if (/#{1,3}\s/.test(text)) s += 3;
      if (/\*\*[^*]+\*\*/.test(text)) s += 2;
      if (/^\s*[-*]\s/m.test(text)) s += 2;
      if (/^\s*\d+\.\s/m.test(text)) s += 2;
      if (/\|.+\|/.test(text)) s += 3;
      if (text.split('\n').length > 6) s += 1;
      if (text.length > 300) s += 1;
      return s >= 3;
    }

    function renderAIResponse(text) {
      var el = document.getElementById('ai-text');
      if (isResearchResponse(text)) {
        el.innerHTML = marked.parse(text);
      } else {
        el.textContent = text;
      }
    }

    // ══════════════════════════════
    // SEND BUTTON ICON SWAP
    // ══════════════════════════════
    var ICON_ARROW = '<path d="M12 20V4M12 4L6 10M12 4L18 10" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>';
    var ICON_STOP  = '<rect x="6" y="6" width="12" height="12" rx="2.5" fill="white"/>';

    function setSendIcon(state) {
      var icon = document.getElementById('send-icon');
      icon.innerHTML = state === 'stop' ? ICON_STOP : ICON_ARROW;
    }

    // ══════════════════════════════
    // THINKING ANIMATION
    // ══════════════════════════════
    var label = document.getElementById('ai-label');
    var aiText = document.getElementById('ai-text');
    var aiActions = document.querySelector('.ai-actions');

    function setLabel(icon, text, withDots) {
      withDots = withDots !== false;
      var dots = withDots ? '<span class="dot-wave"><span></span><span></span><span></span></span>' : '';
      var iconHtml = icon ? '<span class="state-icon">' + icon + '</span>' : '';
      label.innerHTML = iconHtml + '<span>' + text + '</span>' + dots;
      label.className = 'ai-label' + (withDots ? ' active' : '');
    }

    function showExecuted() {
      label.innerHTML = 'Executed';
      label.className = 'ai-label';
      setSendIcon('arrow'); // restore arrow when done
      setTimeout(function() {
        var rawText = aiText.dataset.raw || aiText.textContent;
        renderAIResponse(rawText);
        aiText.style.display = '';
        aiText.classList.add('visible');
        aiActions.style.display = 'flex';
        setTimeout(function() { aiActions.classList.add('visible'); }, 100);
      }, 300);
    }

    aiText.style.display = 'none';
    aiActions.style.display = 'none';

    // Show stop icon while AI is answering on page load
    setSendIcon('stop');
    setLabel('', 'Cleainput is Reading');
    setTimeout(function() {
      setLabel('', 'Cleainput is Understanding');
      setTimeout(showExecuted, 1400);
    }, 1400);

    // ══════════════════════════════
    // BUBBLE EDIT — with version tracking
    // ══════════════════════════════
    var bubble = document.getElementById('user-bubble');
    var editBtn = document.getElementById('bubble-edit-btn');
    var editContainer = document.getElementById('bubble-edit-container');
    var editTextarea = document.getElementById('bubble-edit-textarea');
    var cancelBtn = document.getElementById('bubble-cancel-btn');
    var saveBtn = document.getElementById('bubble-save-btn');

    editBtn.addEventListener('click', function() {
      editTextarea.value = bubble.textContent;
      bubble.style.display = 'none';
      document.querySelector('.message-actions').style.display = 'none';
      editContainer.style.display = 'block';
      editTextarea.focus();
    });

    cancelBtn.addEventListener('click', function() {
      editContainer.style.display = 'none';
      bubble.style.display = '';
      document.querySelector('.message-actions').style.display = '';
    });

    saveBtn.addEventListener('click', function() {
      var newText = editTextarea.value.trim();
      if (newText) {
        // Add new version and jump to it
        messageVersions.push(newText);
        currentVersionIndex = messageVersions.length - 1;
        bubble.textContent = newText;
        updateVersionCounter();
        saveBubbleTitleToCurrentChat(newText);
      }
      editContainer.style.display = 'none';
      bubble.style.display = '';
      document.querySelector('.message-actions').style.display = '';

      // Trigger AI reply
      aiText.style.display = 'none';
      aiText.classList.remove('visible');
      aiActions.style.display = 'none';
      aiActions.classList.remove('visible');

      setSendIcon('stop');
      setLabel('', 'Cleainput is Reading');
      setTimeout(function() {
        setLabel('', 'Cleainput is Understanding');
        setTimeout(function() {
          aiText.dataset.raw = 'This is just testing';
          label.innerHTML = 'Executed';
          label.className = 'ai-label';
          setSendIcon('arrow');
          setTimeout(function() {
            renderAIResponse('This is just testing');
            aiText.style.display = '';
            aiText.classList.add('visible');
            aiActions.style.display = 'flex';
            setTimeout(function() { aiActions.classList.add('visible'); }, 100);
          }, 300);
        }, 1400);
      }, 1400);
    });

    // ══════════════════════════════
    // COPY BUTTONS
    // ══════════════════════════════
    document.getElementById('bubble-copy-btn').addEventListener('click', function() {
      navigator.clipboard.writeText(bubble.textContent).catch(function(){});
      this.style.opacity = '0.4';
      var b = this; setTimeout(function(){ b.style.opacity = ''; }, 800);
    });
    document.getElementById('ai-copy-btn').addEventListener('click', function() {
      navigator.clipboard.writeText(document.getElementById('ai-text').textContent).catch(function(){});
      this.style.opacity = '0.4';
      var b = this; setTimeout(function(){ b.style.opacity = ''; }, 800);
    });

    // ══════════════════════════════
    // LIKE / DISLIKE
    // ══════════════════════════════
    document.getElementById('like-btn').addEventListener('click', function() {
      var active = this.dataset.active === '1';
      this.dataset.active = active ? '0' : '1';
      this.querySelector('path').setAttribute('fill', active ? '#aaa' : '#4a8cff');
      var db = document.getElementById('dislike-btn');
      db.dataset.active = '0'; db.querySelector('path').setAttribute('fill', '#aaa');
    });
    document.getElementById('dislike-btn').addEventListener('click', function() {
      var active = this.dataset.active === '1';
      this.dataset.active = active ? '0' : '1';
      this.querySelector('path').setAttribute('fill', active ? '#aaa' : '#ff4a4a');
      var lb = document.getElementById('like-btn');
      lb.dataset.active = '0'; lb.querySelector('path').setAttribute('fill', '#aaa');
    });

    // ══════════════════════════════
    // EDITOR — persist draft
    // ══════════════════════════════
    var editor = document.getElementById('editor');

    var draft = localStorage.getItem('cleainput_draft');
    if (draft) editor.innerText = draft;

    editor.addEventListener('input', function() {
      if (editor.innerHTML === '<br>' || editor.innerHTML === '') editor.innerHTML = '';
      localStorage.setItem('cleainput_draft', editor.innerText);
    });
    editor.addEventListener('blur', function() {
      if (editor.innerText.trim() === '') editor.innerHTML = '';
    });

    // ══════════════════════════════
    // IMAGE UPLOAD & LIGHTBOX
    // ══════════════════════════════
    var fileInput = document.getElementById('img-file-input');
    var previewStrip = document.getElementById('image-preview-strip');
    var lightbox = document.getElementById('img-lightbox');
    var lightboxImg = document.getElementById('img-lightbox-img');

    document.querySelector('.btn-plus').addEventListener('click', function() {
      fileInput.value = ''; fileInput.click();
    });

    fileInput.addEventListener('change', function() {
      Array.from(fileInput.files).forEach(function(file) {
        if (!file.type.startsWith('image/')) return;
        var reader = new FileReader();
        reader.onload = function(e) { addImageThumb(e.target.result); };
        reader.readAsDataURL(file);
      });
    });

    function addImageThumb(src) {
      var thumb = document.createElement('div');
      thumb.className = 'img-thumb';
      thumb.innerHTML =
        '<img src="' + src + '" alt="upload">' +
        '<button class="remove-img" aria-label="Remove"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><line x1="1" y1="1" x2="11" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="11" y1="1" x2="1" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"/></svg></button>';
      thumb.querySelector('img').addEventListener('click', function() {
        lightboxImg.src = src;
        lightbox.classList.add('open');
      });
      thumb.querySelector('.remove-img').addEventListener('click', function() {
        thumb.remove();
        if (previewStrip.children.length === 0) previewStrip.classList.remove('has-images');
      });
      previewStrip.appendChild(thumb);
      previewStrip.classList.add('has-images');
    }

    document.getElementById('img-lightbox-close').addEventListener('click', function() {
      lightbox.classList.remove('open');
    });
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) lightbox.classList.remove('open');
    });

    // ══════════════════════════════
    // SCROLL BUTTONS
    // ══════════════════════════════
    var msgArea = document.getElementById('message-area');

    function updateScrollBtns() {
      var st = msgArea.scrollTop;
      var max = msgArea.scrollHeight - msgArea.clientHeight;
      document.getElementById('scroll-top-btn').classList.toggle('visible', st > 60);
      document.getElementById('scroll-bottom-btn').classList.toggle('visible', max - st > 60);
    }

    msgArea.addEventListener('scroll', updateScrollBtns);
    updateScrollBtns();

    document.getElementById('scroll-top-btn').addEventListener('click', function() {
      msgArea.scrollTo({ top: 0, behavior: 'smooth' });
    });
    document.getElementById('scroll-bottom-btn').addEventListener('click', function() {
      msgArea.scrollTo({ top: msgArea.scrollHeight, behavior: 'smooth' });
    });
  </script>
</body>
</html>
